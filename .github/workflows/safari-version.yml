name: Track Safari CFBundleVersion

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  get-safari-version:
    strategy:
      matrix:
        include:
          - os: macos-14
            macos_name: Sonoma
          - os: macos-15
            macos_name: Sequoia

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current Safari version
        run: |
          echo "Safari BEFORE update:"
          defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion
          defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString

      # ── Install only the Safari update ──────────────────────────────────
      - name: Find and install Safari update only
        run: |
          echo "Listing available software updates..."
          UPDATE_LIST=$(sudo softwareupdate -l 2>&1)
          echo "$UPDATE_LIST"
          echo "---"

          # Extract the label of the Safari update.
          # softwareupdate -l output pattern:
          #   * Label: Safari26.5SequoiaAuto-26.5.2
          #       Title: Safari, Version: 26.5.2 ...
          #
          # Strategy: grab the Label line that is immediately followed
          # by a Title line containing "Safari".

          SAFARI_LABEL=$(echo "$UPDATE_LIST" \
            | awk '
                /\* Label:/ { label = $0 }
                /Title: Safari/ {
                  # extract just the label value after "Label: "
                  sub(/.*\* Label: /, "", label)
                  print label
                  exit
                }
              ')

          if [ -z "$SAFARI_LABEL" ]; then
            echo "No Safari update found in softwareupdate list."
            echo "Safari is already up to date — skipping install."
            exit 0
          fi

          echo "Found Safari update: '$SAFARI_LABEL'"
          echo "Installing Safari update only..."

          sudo softwareupdate -i "$SAFARI_LABEL" --verbose
          INSTALL_EXIT=$?

          if [ $INSTALL_EXIT -eq 0 ]; then
            echo "Safari update installed successfully."
          else
            echo "softwareupdate exited with code $INSTALL_EXIT"
            exit $INSTALL_EXIT
          fi
      # ────────────────────────────────────────────────────────────────────

      - name: Show Safari version after update
        run: |
          echo "Safari AFTER update:"
          CFB=$(defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion)
          VER=$(defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString)
          echo "  Marketing version : $VER"
          echo "  CFBundleVersion   : $CFB"

      - name: Read and save Safari CFBundleVersion
        run: |
          CFB=$(defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion)
          VER=$(defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString)
          MACOS=$(sw_vers -productVersion)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p output
          cat > output/safari_${{ matrix.macos_name }}.json << EOF
          {
            "last_updated": "$DATE",
            "macos_name": "${{ matrix.macos_name }}",
            "macos_version": "$MACOS",
            "safari_version": "$VER",
            "CFBundleVersion": "$CFB"
          }
          EOF
          cat output/safari_${{ matrix.macos_name }}.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-${{ matrix.macos_name }}
          path: output/safari_${{ matrix.macos_name }}.json

  commit-results:
    runs-on: ubuntu-latest
    needs: get-safari-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Sonoma result
        uses: actions/download-artifact@v4
        with:
          name: safari-Sonoma
          path: output/

      - name: Download Sequoia result
        uses: actions/download-artifact@v4
        with:
          name: safari-Sequoia
          path: output/

      - name: Append to history CSV and generate fixlets
        run: |
          SONOMA_CFB=$(jq -r '.CFBundleVersion' output/safari_Sonoma.json)
          SONOMA_VER=$(jq -r '.safari_version'  output/safari_Sonoma.json)
          SONOMA_MAC=$(jq -r '.macos_version'   output/safari_Sonoma.json)
          SEQUOIA_CFB=$(jq -r '.CFBundleVersion' output/safari_Sequoia.json)
          SEQUOIA_VER=$(jq -r '.safari_version'  output/safari_Sequoia.json)
          SEQUOIA_MAC=$(jq -r '.macos_version'   output/safari_Sequoia.json)
          DATE=$(date -u +"%Y-%m-%d")

          echo "Sonoma  : Safari $SONOMA_VER  → $SONOMA_CFB"
          echo "Sequoia : Safari $SEQUOIA_VER → $SEQUOIA_CFB"

          [ ! -f safari_history.csv ] && \
            echo "date,macos_name,macos_version,safari_version,CFBundleVersion" > safari_history.csv
          grep -q "$SONOMA_CFB"  safari_history.csv || \
            echo "$DATE,Sonoma,$SONOMA_MAC,$SONOMA_VER,$SONOMA_CFB" >> safari_history.csv
          grep -q "$SEQUOIA_CFB" safari_history.csv || \
            echo "$DATE,Sequoia,$SEQUOIA_MAC,$SEQUOIA_VER,$SEQUOIA_CFB" >> safari_history.csv

          cat > safari_fixlet_sonoma.xml << EOF
          <!-- Safari $SONOMA_VER — macOS Sonoma -->
          <Fixlet>
            <Relevance><![CDATA[(exists string "ProductVersion" whose (it as string >= "14.0" and it as string < "15.0") of dictionary of it) of file "/System/Library/CoreServices/SystemVersion.plist"]]></Relevance>
            <Relevance>(exists string "CFBundleVersion" whose (it as string != "$SONOMA_CFB") of dictionary of it) of file "/Applications/Safari.app/Contents/version.plist"</Relevance>
            <Relevance><![CDATA[((version (version of application "Safari.app" as string & ".0.0") < "$SONOMA_VER" as version))]]></Relevance>
          </Fixlet>
          EOF

          cat > safari_fixlet_sequoia.xml << EOF
          <!-- Safari $SEQUOIA_VER — macOS Sequoia -->
          <Fixlet>
            <Relevance><![CDATA[(exists string "ProductVersion" whose (it as string >= "15.0" and it as string < "16.0") of dictionary of it) of file "/System/Library/CoreServices/SystemVersion.plist"]]></Relevance>
            <Relevance>(exists string "CFBundleVersion" whose (it as string != "$SEQUOIA_CFB") of dictionary of it) of file "/Applications/Safari.app/Contents/version.plist"</Relevance>
            <Relevance><![CDATA[((version (version of application "Safari.app" as string & ".0.0") < "$SEQUOIA_VER" as version))]]></Relevance>
          </Fixlet>
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add safari_history.csv safari_fixlet_sonoma.xml safari_fixlet_sequoia.xml
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: Safari CFBundleVersion $(date -u +%Y-%m-%d)"
            git push
          )