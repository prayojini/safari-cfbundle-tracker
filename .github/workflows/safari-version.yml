name: Track Safari CFBundleVersion

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  get-safari-version:
    strategy:
      matrix:
        include:
          - os: macos-14
            macos_name: Sonoma
          - os: macos-15
            macos_name: Sequoia

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── KEY FIX: Update Safari to latest before reading ──────────────────
      - name: Check available software updates
        run: |
          echo "Current Safari version:"
          defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion

          echo ""
          echo "Checking for updates..."
          sudo softwareupdate -l 2>&1 || true

      - name: Install all available updates (includes Safari)
        run: |
          sudo softwareupdate --install --all 2>&1 || true
          echo "Update complete"

      - name: Verify Safari version after update
        run: |
          echo "Safari version after update:"
          defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion
          defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString
      # ─────────────────────────────────────────────────────────────────────

      - name: Read Safari CFBundleVersion
        run: |
          CFB=$(defaults read /Applications/Safari.app/Contents/version.plist CFBundleVersion)
          VER=$(defaults read /Applications/Safari.app/Contents/Info.plist CFBundleShortVersionString)
          MACOS=$(sw_vers -productVersion)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "macOS   : ${{ matrix.macos_name }} $MACOS"
          echo "Safari  : $VER"
          echo "CFBundle: $CFB"

          mkdir -p output
          cat > output/safari_${{ matrix.macos_name }}.json << EOF
          {
            "last_updated": "$DATE",
            "macos_name": "${{ matrix.macos_name }}",
            "macos_version": "$MACOS",
            "safari_version": "$VER",
            "CFBundleVersion": "$CFB"
          }
          EOF

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: safari-${{ matrix.macos_name }}
          path: output/safari_${{ matrix.macos_name }}.json

  commit-results:
    runs-on: ubuntu-latest
    needs: get-safari-version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Sonoma result
        uses: actions/download-artifact@v4
        with:
          name: safari-Sonoma
          path: output/

      - name: Download Sequoia result
        uses: actions/download-artifact@v4
        with:
          name: safari-Sequoia
          path: output/

      - name: Append to history CSV and generate fixlets
        run: |
          SONOMA_CFB=$(jq -r '.CFBundleVersion' output/safari_Sonoma.json)
          SONOMA_VER=$(jq -r '.safari_version'  output/safari_Sonoma.json)
          SONOMA_MAC=$(jq -r '.macos_version'   output/safari_Sonoma.json)
          SEQUOIA_CFB=$(jq -r '.CFBundleVersion' output/safari_Sequoia.json)
          SEQUOIA_VER=$(jq -r '.safari_version'  output/safari_Sequoia.json)
          SEQUOIA_MAC=$(jq -r '.macos_version'   output/safari_Sequoia.json)
          DATE=$(date -u +"%Y-%m-%d")

          echo "=== Results ==="
          echo "Sonoma  : Safari $SONOMA_VER  → CFBundleVersion: $SONOMA_CFB"
          echo "Sequoia : Safari $SEQUOIA_VER → CFBundleVersion: $SEQUOIA_CFB"

          # History CSV
          [ ! -f safari_history.csv ] && echo "date,macos_name,macos_version,safari_version,CFBundleVersion" > safari_history.csv
          grep -q "$SONOMA_CFB"  safari_history.csv || echo "$DATE,Sonoma,$SONOMA_MAC,$SONOMA_VER,$SONOMA_CFB"   >> safari_history.csv
          grep -q "$SEQUOIA_CFB" safari_history.csv || echo "$DATE,Sequoia,$SEQUOIA_MAC,$SEQUOIA_VER,$SEQUOIA_CFB" >> safari_history.csv

          # Fixlet XMLs
          cat > safari_fixlet_sonoma.xml << EOF
          <!-- Safari $SONOMA_VER — macOS Sonoma -->
          <Fixlet>
            <Relevance><![CDATA[(exists string "ProductVersion" whose (it as string >= "14.0" and it as string < "15.0") of dictionary of it) of file "/System/Library/CoreServices/SystemVersion.plist"]]></Relevance>
            <Relevance>(exists string "CFBundleVersion" whose (it as string != "$SONOMA_CFB") of dictionary of it) of file "/Applications/Safari.app/Contents/version.plist"</Relevance>
            <Relevance><![CDATA[((version (version of application "Safari.app" as string & ".0.0") < "$SONOMA_VER" as version))]]></Relevance>
          </Fixlet>
          EOF

          cat > safari_fixlet_sequoia.xml << EOF
          <!-- Safari $SEQUOIA_VER — macOS Sequoia -->
          <Fixlet>
            <Relevance><![CDATA[(exists string "ProductVersion" whose (it as string >= "15.0" and it as string < "16.0") of dictionary of it) of file "/System/Library/CoreServices/SystemVersion.plist"]]></Relevance>
            <Relevance>(exists string "CFBundleVersion" whose (it as string != "$SEQUOIA_CFB") of dictionary of it) of file "/Applications/Safari.app/Contents/version.plist"</Relevance>
            <Relevance><![CDATA[((version (version of application "Safari.app" as string & ".0.0") < "$SEQUOIA_VER" as version))]]></Relevance>
          </Fixlet>
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add safari_history.csv safari_fixlet_sonoma.xml safari_fixlet_sequoia.xml
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "chore: Safari CFBundleVersion $(date -u +%Y-%m-%d)"
            git push
          )